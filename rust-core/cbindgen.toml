# cbindgen configuration for the ResearchSSH-Next Rust core.
# The header is generated from build.rs into include/research_ssh_core.h.
language = "C"
pragma_once = true
cpp_compat = true            # wrap declarations in extern "C" when compiled as C++
include_guard = "RESEARCH_SSH_CORE_H"
autogen_warning = "/* AUTO-GENERATED by cbindgen via build.rs. DO NOT EDIT BY HAND. */"
documentation = true
documentation_style = "c99"
style = "type"
tab_width = 4
line_length = 100

[parse]
parse_deps = false

[export]
# Only items reachable from the crate's public surface and marked #[no_mangle]
# extern "C" / #[repr(C)] are exported. The event types are only reachable via the
# callback function pointer, so force their export (plus a named callback typedef
# for the C++ side to use).
prefix = ""
include = ["RsEvent", "RsEventKind", "RsSessionState", "RsEventCallback", "RsFileKind", "RsFileEntry", "RsFsResultKind", "RsFsResult", "RsFileCallback"]

[enum]
prefix_with_name = true      # avoid C enum constant name collisions
